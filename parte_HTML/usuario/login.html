<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Code Solve</title>
    <link rel="stylesheet" href="../../parte_CSS/user.css">
</head>

<body>

<a href="../index.html" class="voltar-home">Home</a>

<div class="container">

    <h1>Login</h1>

    <label for="usuario">Email</label>
    <input type="text" id="usuario" placeholder="Digite seu email">

    <label for="senha">Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha">

    <button type="button" onclick="fazerLogin()">
        Entrar
    </button>

    <div class="bottom-text">
        Não possui conta?
        <a href="cadastro.html">Cadastrar</a>
    </div>

</div>

<script>
async function fazerLogin() {
    const email = document.getElementById("usuario").value;
    const password = document.getElementById("senha").value;

    const response = await fetch("http://127.0.0.1:8000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (data.access_token) {
        localStorage.setItem("token", data.access_token);
        window.location.href = "perfil.html";
    } else {
        alert(data.error || "Login inválido");
    }
}
</script>

</body>
</html>
