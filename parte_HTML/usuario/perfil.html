<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>

    <link rel="stylesheet" href="../../parte_CSS/perfil.css">
</head>

<body>

<a href="../index.html" class="voltar-home">Home</a>

<main class="perfil-page">

    <section class="perfil-header">
        <div class="foto-perfil">👤</div>
    </section>

    <section class="perfil-box">
        
        <h2>Informações do Perfil</h2>

        <label>Nome</label>
        <input type="text" id="nome">

        <label>Email</label>
        <input type="email" id="email">

    </section>

    <section class="salvar-box">
        <button onclick="logout()">Sair</button>
    </section>

</main>

<script src="./usuario/auth.js"></script>

<script>
    protectPage();

    async function load() {
        const user = await getProfile();

        document.getElementById("nome").value = user.username || "";
        document.getElementById("email").value = user.email || "";
    }

    load();
</script>

</body>
</html>
