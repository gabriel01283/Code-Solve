<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>

    <link rel="stylesheet" href="../../parte_CSS/perfil.css">
</head>

<body>

    <main class="perfil-page">

        <!-- PERFIL -->
        <section class="perfil-header">

            <div class="foto-perfil">
                👤
            </div>

            <div class="info-usuario">
                <h1>Maria Clara</h1>
                <p>Estudante de Engenharia de Software</p>
            </div>

        </section>

        <!-- SOBRE -->
        <section class="sobre-box">

            <h2>Sobre Mim</h2>

            <textarea
                placeholder="Fale um pouco sobre você... estudos, hobbies, objetivos..."
            ></textarea>

            <button>
                Salvar Resumo
            </button>

        </section>

        <!-- NOVO COMENTÁRIO -->
        <section class="comentario-input">

            <h2>Perguntas e Comentários</h2>

            <div class="input-box">
                <input
                    type="text"
                    placeholder="Faça uma pergunta ou comentário..."
                >

                <button>
                    Publicar
                </button>
            </div>

        </section>

        <!-- COMENTÁRIOS -->
        <section class="comentarios-container">

            <div class="comentario-card">

                <div class="comentario-top">
                    <h3>Usuário123</h3>
                </div>

                <p>Qual linguagem você mais gosta?</p>

                <button class="responder-btn">
                    Responder
                </button>

                <div class="resposta-box">
                    <input
                        type="text"
                        placeholder="Responder comentário..."
                    >
                </div>

            </div>

            <div class="comentario-card">

                <div class="comentario-top">
                    <h3>AnaDev</h3>
                </div>

                <p>Você pretende trabalhar com front-end?</p>

                <button class="responder-btn">
                    Responder
                </button>

                <div class="resposta-box">
                    <input
                        type="text"
                        placeholder="Responder comentário..."
                    >
                </div>

            </div>

            <div class="comentario-card">

                <div class="comentario-top">
                    <h3>Pedro</h3>
                </div>

                <p>Como está sendo Engenharia de Software?</p>

                <button class="responder-btn">
                    Responder
                </button>

                <div class="resposta-box">
                    <input
                        type="text"
                        placeholder="Responder comentário..."
                    >
                </div>

            </div>

        </section>

    </main>

</body>
</html>
