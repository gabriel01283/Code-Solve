<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>

    <link rel="stylesheet" href="../../parte_CSS/perfil.css">
</head>

<body>

    <a href="../index.html" class="voltar-home">
        🏠 Voltar para Home
    </a>

    <main class="perfil-page">

        <!-- FOTO -->
        <section class="perfil-header">

            <div class="foto-perfil">
                👤
            </div>

            <label for="foto" class="upload-foto">
                Alterar Foto
            </label>

            <input
                type="file"
                id="foto"
                hidden
            >

        </section>

        <!-- DADOS DO PERFIL -->
        <section class="perfil-box">

            <h2>Informações do Perfil</h2>

            <label for="nome">Nome</label>
            <input
                type="text"
                id="nome"
                placeholder="Digite seu nome"
            >

            <label for="descricao">Descrição</label>
            <input
                type="text"
                id="descricao"
                placeholder="Ex: Estudante de Engenharia de Software"
            >

            <label for="email">Email</label>
            <input
                type="email"
                id="email"
                placeholder="Digite seu email"
            >

            <label for="github">GitHub</label>
            <input
                type="text"
                id="github"
                placeholder="Link do GitHub"
            >

            <label for="linkedin">LinkedIn</label>
            <input
                type="text"
                id="linkedin"
                placeholder="Link do LinkedIn"
            >

        </section>

        <!-- SOBRE -->
        <section class="sobre-box">

            <h2>Sobre Mim</h2>

            <textarea
                placeholder="Fale um pouco sobre você..."
            ></textarea>

        </section>

        <!-- BOTÃO -->
        <section class="salvar-box">

            <button>
                Salvar Alterações
            </button>

        </section>

    </main>

</body>
</html>
