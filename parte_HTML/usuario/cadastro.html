<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Code Solve</title>
    <link rel="stylesheet" href="../../parte_CSS/user.css">
</head>

<body>

    <a href="../index.html" class="voltar-home">
        Home
    </a>

    <div class="container">

        <h1>Criar Conta</h1>

        <label for="nome">Nome do Usuário</label>
        <input type="text" id="nome" placeholder="Digite seu nome">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email">

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Crie uma senha">

        <label for="data">Data de Nascimento</label>
        <input type="date" id="data">

        <button type="button" onclick="cadastrar()">
            Cadastrar
        </button>

        <div id="mensagem"></div>

        <div class="bottom-text">
            Já possui conta?
            <a href="login.html">Fazer Login</a>
        </div>

    </div>

    <script>
        async function cadastrar() {

            const username = document.getElementById("nome").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("senha").value;

            const mensagem = document.getElementById("mensagem");

            try {

                const response = await fetch("http://127.0.0.1:8000/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password
                    })
                });

                const data = await response.json();

                if (data.error) {
                    mensagem.textContent = data.error;
                    mensagem.className = "erro";
                    return;
                }

                mensagem.textContent = "Cadastro realizado com sucesso!";
                mensagem.className = "sucesso";

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);

            } catch (error) {
                console.error(error);

                mensagem.textContent = "Erro ao conectar com o servidor.";
                mensagem.className = "erro";
            }
        }
    </script>

</body>
</html>
