<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA - Solve Code</title>

    <link rel="stylesheet" href="/parte_CSS/pesquisa_com_IA.css">

</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <!-- CHUVA BINÁRIA -->
        <div class="binary-rain">

            <span>1010101</span>
            <span>0101010</span>
            <span>1101011</span>
            <span>0010110</span>
            <span>1011100</span>
            <span>0110101</span>
            <span>1001010</span>
            <span>0101101</span>

        </div>

        <button class="home-btn" onclick="window.location.href='../index.html'">
            Home
        </button>

        <h1>Solve Code IA</h1>

        <button class="config-btn">⚙</button>

    </nav>

    <!-- LAYOUT -->
    <main class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <!-- RECENTES -->
            <div class="sidebar-block">

                <h3>Recentes</h3>

                <ul class="sidebar-list scrollable-list">
                   
                </ul>
            
            </div>

            <!-- MAIS PROCURADOS -->
            <div class="sidebar-block">

                <h3>Mais procurados</h3>

                <ul class="sidebar-list scrollable-list">
                    <li>JavaScript básico</li>
                    <li>Git e GitHub</li>
                    <li>HTML + CSS</li>
                    <li>Node.js</li>
                    <li>API REST</li>
                    <li>Python</li>
                    <li>Java</li>
                    <li>Docker</li>
                </ul>

            </div>

            <!-- BLOCO FUTURO -->
            <div class="sidebar-block empty-block"></div>

        </aside>

        <!-- CHAT -->
        <section class="chat">

            <div class="messages" id="messages"></div>

            <div class="input-wrapper">

                <input 
                    type="text"
                    id="chat-input"
                    placeholder="Pergunte algo..."
                />

                <button id="send-btn">→</button>

            </div>

        </section>

    </main>

    <script src="../../parte_HTML/IA/chat.js"></script>

</body>
</html>
